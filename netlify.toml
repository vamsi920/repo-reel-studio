[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # Ensure proper module resolution
  NODE_OPTIONS = "--experimental-specifier-resolution=node"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
