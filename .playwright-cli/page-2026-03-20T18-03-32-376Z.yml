              - heading "Privacy Policy" [level=2] [ref=e61]
              - paragraph [ref=e62]: How GitFlick handles account data, repository context, generated media, and the vendors involved in running the product.
            - generic [ref=e64]:
              - paragraph [ref=e65]: GitFlick ("we," "our," or "us") is committed to protecting your privacy. This Privacy Policy explains how we collect, use, disclose, and safeguard your information when you use our service to transform GitHub repositories into video walkthroughs.
              - generic [ref=e66]:
                - heading "1. Information We Collect" [level=2] [ref=e67]
                - paragraph [ref=e68]: "We collect information you provide directly and information we obtain when you use our service:"
                - list [ref=e69]:
                  - listitem [ref=e70]:
                    - strong [ref=e71]: "Account information:"
                    - text: When you sign up, we collect your email address and any name or profile information you provide (e.g., via Supabase Auth).
                  - listitem [ref=e72]:
                    - strong [ref=e73]: "Repository data:"
                    - text: When you submit a GitHub repository URL, we access and process the repository’s code and structure to generate videos. We do not store the full contents of your repository beyond what is needed for generating and serving your video.
                  - listitem [ref=e74]:
                    - strong [ref=e75]: "Usage data:"
                    - text: We collect usage information such as actions you take in the app, project and video metadata, and basic analytics to operate and improve the service.
              - generic [ref=e76]:
                - heading "2. How We Use Your Information" [level=2] [ref=e77]
                - paragraph [ref=e78]: We use the information we collect to provide, maintain, and improve GitFlick; generate videos from your repositories using AI, including Google Gemini and text-to-speech services; authenticate you and manage your account; send you service-related communications; and comply with legal obligations.
              - generic [ref=e79]:
                - heading "3. Third-Party Services" [level=2] [ref=e80]
                - paragraph [ref=e81]: "We use trusted third parties to run GitFlick:"
                - list [ref=e82]:
                  - listitem [ref=e83]:
                    - strong [ref=e84]: "Supabase:"
                    - text: Authentication, database, and storage. Their privacy policy applies to data they process on our behalf.
                  - listitem [ref=e85]:
                    - strong [ref=e86]: "Google (Gemini, Cloud TTS):"
                    - text: AI analysis and narration. Repository and script content may be sent to Google APIs to generate videos and voice. Google’s privacy policy applies to that processing.
                  - listitem [ref=e87]:
                    - strong [ref=e88]: "GitHub:"
                    - text: We access only the repositories you explicitly submit. We do not access your GitHub account beyond the specific repo URLs you provide.
              - generic [ref=e89]:
                - heading "4. Data Retention" [level=2] [ref=e90]
                - paragraph [ref=e91]: We retain your account data and project metadata for as long as your account is active. Generated videos and related assets are stored so you can access and export them. You may request deletion of your data by contacting us.
              - generic [ref=e92]:
                - heading "5. Your Rights" [level=2] [ref=e93]
                - paragraph [ref=e94]: Depending on your location, you may have rights to access, correct, delete, or restrict processing of your personal data, or to object to certain processing. To exercise these rights or ask questions, contact us at the email below.
              - generic [ref=e95]:
                - heading "6. Security" [level=2] [ref=e96]
                - paragraph [ref=e97]: We use industry-standard measures to protect your data, including secure connections, access controls, and relying on our providers’ security practices. No method of transmission over the Internet is 100% secure, and we cannot guarantee absolute security.
              - generic [ref=e98]:
                - heading "7. Changes" [level=2] [ref=e99]
                - paragraph [ref=e100]: We may update this Privacy Policy from time to time. We will notify you of material changes by posting the updated policy on this page and updating the "Last updated" date. Your continued use of GitFlick after changes constitutes acceptance of the revised policy.
              - generic [ref=e101]:
                - heading "8. Contact" [level=2] [ref=e102]
                - paragraph [ref=e103]:
                  - text: For privacy-related questions or requests, contact us at
                  - link "privacy@gitflick.app" [ref=e104] [cursor=pointer]:
                    - /url: mailto:privacy@gitflick.app
